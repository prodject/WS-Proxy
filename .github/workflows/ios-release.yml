name: iOS Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app
        run: |
          xcodebuild \
            -project WS-Proxy.xcodeproj \
            -scheme WSProxy \
            -configuration Release \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            clean build \
            BUILD_DIR=build

      - name: Package IPA
        run: |
          rm -rf Payload WSProxy.ipa
          mkdir -p Payload
          cp -R build/Release-iphoneos/WSProxy.app Payload/
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent Payload WSProxy.ipa

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WSProxy.ipa
          path: WSProxy.ipa

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: WSProxy.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: iOS Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME:-}" == v* ]]; then
            APP_VERSION="${GITHUB_REF_NAME#v}"
          else
            APP_VERSION="0.1.0-dev"
          fi
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          IPA_NAME="WSProxy-${APP_VERSION}+${BUILD_NUMBER}.ipa"
          {
            echo "app_version=${APP_VERSION}"
            echo "build_number=${BUILD_NUMBER}"
            echo "ipa_name=${IPA_NAME}"
          } >> "${GITHUB_OUTPUT}"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build IPA
        env:
          APP_VERSION: ${{ steps.version.outputs.app_version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
          IPA_NAME: ${{ steps.version.outputs.ipa_name }}
        run: chmod +x Scripts/build_ios_ipa.sh && Scripts/build_ios_ipa.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.ipa_name }}
          path: ${{ steps.version.outputs.ipa_name }}
          if-no-files-found: error

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.version.outputs.ipa_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: iOS Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          APP_VERSION="$(awk '/MARKETING_VERSION:/ { print $2; exit }' project.yml)"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          RUN_ATTEMPT="${GITHUB_RUN_ATTEMPT}"
          TAG_NAME="v${APP_VERSION}-build${BUILD_NUMBER}-a${RUN_ATTEMPT}"
          IPA_NAME="WSProxy-${APP_VERSION}+${BUILD_NUMBER}.${RUN_ATTEMPT}.ipa"
          {
            echo "app_version=${APP_VERSION}"
            echo "build_number=${BUILD_NUMBER}"
            echo "run_attempt=${RUN_ATTEMPT}"
            echo "tag_name=${TAG_NAME}"
            echo "ipa_name=${IPA_NAME}"
          } >> "${GITHUB_OUTPUT}"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build IPA
        env:
          APP_VERSION: ${{ steps.version.outputs.app_version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
          IPA_NAME: ${{ steps.version.outputs.ipa_name }}
        run: chmod +x Scripts/build_ios_ipa.sh && Scripts/build_ios_ipa.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.ipa_name }}
          path: ${{ steps.version.outputs.ipa_name }}
          if-no-files-found: error

      - name: Create tag
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag_name }}" -m "WS Proxy ${{ steps.version.outputs.tag_name }}"
          git push origin "${{ steps.version.outputs.tag_name }}"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          files: ${{ steps.version.outputs.ipa_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
